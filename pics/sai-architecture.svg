<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="660" viewBox="0 0 1120 660" role="img" aria-labelledby="title desc">
  <title id="title">Sai 系统架构总览</title>
  <desc id="desc">展示交互入口、运行编排、能力控制以及状态持久化四层架构</desc>
  <defs>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L8 4 L0 8 Z" fill="#68767d"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L8 4 L0 8 Z" fill="#3f7fa6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L8 4 L0 8 Z" fill="#4f956b"/>
    </marker>
    <style>
      .band-title { font: 600 15px system-ui, sans-serif; fill: #273238; }
      .card-title { font: 600 14px system-ui, sans-serif; fill: #233038; }
      .card-body { font: 12px system-ui, sans-serif; fill: #536168; }
      .edge-label { font: 11px system-ui, sans-serif; fill: #486052; }
      .edge { fill: none; stroke: #68767d; stroke-width: 1.5; marker-end: url(#arrow-gray); }
      .edge-blue { fill: none; stroke: #3f7fa6; stroke-width: 2; marker-end: url(#arrow-blue); }
      .edge-green { fill: none; stroke: #4f956b; stroke-width: 2; marker-end: url(#arrow-green); }
      .edge-dashed { fill: none; stroke: #87969d; stroke-width: 1.3; stroke-dasharray: 5 5; marker-end: url(#arrow-gray); }
    </style>
  </defs>

  <rect width="1120" height="660" fill="#ffffff"/>

  <g id="surface-layer">
    <rect x="20" y="20" width="1080" height="120" rx="6" fill="#f7f8f9" stroke="#aab4bb"/>
    <text x="40" y="48" class="band-title">交互入口</text>
    <g>
      <rect x="60" y="62" width="240" height="50" rx="6" fill="#ffffff" stroke="#5f6b73"/>
      <text x="180" y="84" text-anchor="middle" class="card-title">CLI / TUI</text>
      <text x="180" y="101" text-anchor="middle" class="card-body">单轮命令与交互会话</text>
    </g>
    <g>
      <rect x="440" y="62" width="240" height="50" rx="6" fill="#ffffff" stroke="#5f6b73"/>
      <text x="560" y="84" text-anchor="middle" class="card-title">Web 工作台</text>
      <text x="560" y="101" text-anchor="middle" class="card-body">会话、终端与配置界面</text>
    </g>
    <g>
      <rect x="820" y="62" width="240" height="50" rx="6" fill="#ffffff" stroke="#5f6b73"/>
      <text x="940" y="84" text-anchor="middle" class="card-title">消息网关与定时任务</text>
      <text x="940" y="101" text-anchor="middle" class="card-body">QQ / 微信 / OneBot / Cron</text>
    </g>
  </g>

  <g id="runtime-layer">
    <rect x="20" y="160" width="1080" height="140" rx="6" fill="#f3f8fc" stroke="#7aa7c7"/>
    <text x="40" y="188" class="band-title">运行编排</text>
    <g>
      <rect x="100" y="210" width="270" height="70" rx="6" fill="#e8f2fa" stroke="#3f7fa6"/>
      <text x="235" y="238" text-anchor="middle" class="card-title">Runner</text>
      <text x="235" y="258" text-anchor="middle" class="card-body">统一 submission、会话所有权与事件输出</text>
    </g>
    <g>
      <rect x="425" y="210" width="270" height="70" rx="6" fill="#eaf6ef" stroke="#4f956b"/>
      <text x="560" y="238" text-anchor="middle" class="card-title">Agent 核心</text>
      <text x="560" y="258" text-anchor="middle" class="card-body">上下文投影、压缩、记忆召回与工具循环</text>
    </g>
    <g>
      <rect x="750" y="210" width="270" height="70" rx="6" fill="#fff6df" stroke="#b58a31"/>
      <text x="885" y="238" text-anchor="middle" class="card-title">LLM 适配器</text>
      <text x="885" y="258" text-anchor="middle" class="card-body">OpenAI Chat / Responses / Anthropic</text>
    </g>
    <rect x="705" y="226" width="70" height="18" fill="#f3f8fc"/>
    <text x="740" y="239" text-anchor="middle" class="edge-label">流式请求</text>
  </g>

  <g id="capability-layer">
    <rect x="20" y="320" width="1080" height="140" rx="6" fill="#faf7fb" stroke="#a887b8"/>
    <text x="40" y="348" class="band-title">能力与控制</text>
    <g>
      <rect x="47" y="350" width="210" height="70" rx="6" fill="#f4eefa" stroke="#87629a"/>
      <text x="152" y="378" text-anchor="middle" class="card-title">工具注册表</text>
      <text x="152" y="398" text-anchor="middle" class="card-body">内置工具、渐进加载、MCP、Skills</text>
    </g>
    <g>
      <rect x="292" y="350" width="215" height="70" rx="6" fill="#fff0ed" stroke="#b96b5e"/>
      <text x="399" y="378" text-anchor="middle" class="card-title">权限与生命周期</text>
      <text x="399" y="398" text-anchor="middle" class="card-body">Yolo / Audited / Plan、Hooks</text>
    </g>
    <g>
      <rect x="532" y="350" width="230" height="70" rx="6" fill="#edf6f4" stroke="#4f9085"/>
      <text x="647" y="378" text-anchor="middle" class="card-title">子智能体</text>
      <text x="647" y="398" text-anchor="middle" class="card-body">独立循环、状态流与 Git worktree</text>
    </g>
    <g>
      <rect x="797" y="350" width="230" height="70" rx="6" fill="#f4f4ea" stroke="#8c8a4f"/>
      <text x="912" y="378" text-anchor="middle" class="card-title">渠道与后台任务</text>
      <text x="912" y="398" text-anchor="middle" class="card-body">媒体回复、进程管理与调度</text>
    </g>
  </g>

  <g id="data-layer">
    <rect x="20" y="480" width="1080" height="160" rx="6" fill="#f5f7f7" stroke="#88979b"/>
    <text x="40" y="508" class="band-title">状态与持久化</text>
    <g>
      <rect x="47" y="505" width="210" height="85" rx="6" fill="#ffffff" stroke="#63747a"/>
      <text x="152" y="536" text-anchor="middle" class="card-title">StateStore</text>
      <text x="152" y="556" text-anchor="middle" class="card-body">工作区会话、轮次</text>
      <text x="152" y="573" text-anchor="middle" class="card-body">工具历史与撤销</text>
    </g>
    <g>
      <rect x="287" y="505" width="210" height="85" rx="6" fill="#ffffff" stroke="#63747a"/>
      <text x="392" y="536" text-anchor="middle" class="card-title">MemoryStore</text>
      <text x="392" y="556" text-anchor="middle" class="card-body">Markdown、SQLite FTS</text>
      <text x="392" y="573" text-anchor="middle" class="card-body">与裁剪上下文</text>
    </g>
    <g>
      <rect x="527" y="505" width="210" height="85" rx="6" fill="#ffffff" stroke="#63747a"/>
      <text x="632" y="536" text-anchor="middle" class="card-title">Runtime Recovery</text>
      <text x="632" y="556" text-anchor="middle" class="card-body">进程、传输事件</text>
      <text x="632" y="573" text-anchor="middle" class="card-body">重放与审计</text>
    </g>
    <g>
      <rect x="767" y="505" width="260" height="85" rx="6" fill="#ffffff" stroke="#63747a"/>
      <text x="897" y="536" text-anchor="middle" class="card-title">配置与资源</text>
      <text x="897" y="556" text-anchor="middle" class="card-body">Provider、人格、知识库</text>
      <text x="897" y="573" text-anchor="middle" class="card-body">缓存与图片</text>
    </g>
  </g>

  <g id="edges">
    <path class="edge" d="M180 112 V210"/>
    <path class="edge" d="M560 112 V165 H265 V210"/>
    <path class="edge" d="M940 112 V150 H350 V210"/>
    <path class="edge-blue" d="M370 245 H425"/>
    <path class="edge-green" d="M695 245 H750"/>
    <path class="edge" d="M560 280 V315 H152 V350"/>
    <path class="edge" d="M257 385 H292"/>
    <path class="edge" d="M507 385 H532"/>
    <path class="edge" d="M940 112 V150 H1070 V385 H1027"/>
    <path class="edge" d="M235 280 V310 H35 V547 H47"/>
    <path class="edge" d="M560 280 V315 H520 V475 H392 V505"/>
    <path class="edge" d="M647 420 V505"/>
    <path class="edge" d="M912 420 V475 H632 V505"/>
    <path class="edge-dashed" d="M1027 547 H1070 V310 H885 V280"/>
  </g>

  <text x="1080" y="625" text-anchor="end" class="card-body">实线：调用或写入　虚线：配置依赖</text>
</svg>
