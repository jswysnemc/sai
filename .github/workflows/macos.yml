name: macOS

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web assets
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install ripgrep
        run: brew install ripgrep

      - name: Run Rust tests
        run: cargo test --locked

      - name: Run web tests
        working-directory: web
        run: npm test

      - name: Build macOS executable
        run: cargo build --release --locked

      - name: Verify macOS executable
        run: test -x target/release/sai

      - name: Upload macOS executable
        uses: actions/upload-artifact@v4
        with:
          name: sai-macos-${{ runner.arch }}
          path: target/release/sai
          if-no-files-found: error

      - name: Prepare macOS release asset
        if: startsWith(github.ref, 'refs/tags/v')
        run: cp target/release/sai "target/release/sai-macos-${{ runner.arch }}"

      - name: Publish macOS release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: target/release/sai-macos-${{ runner.arch }}
