name: Windows

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web assets
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install ripgrep
        run: choco install ripgrep --no-progress --yes

      - name: Run Rust tests
        run: cargo test --locked

      - name: Run web tests
        working-directory: web
        run: npm test

      - name: Build Windows executable
        run: cargo build --release --locked

      - name: Verify Windows executable
        shell: pwsh
        run: |
          if (-not (Test-Path "target/release/sai.exe")) {
            throw "Windows executable was not generated: target/release/sai.exe"
          }

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: sai-windows-x86_64
          path: target/release/sai.exe
          if-no-files-found: error

      - name: Prepare Windows release asset
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: Copy-Item "target/release/sai.exe" "target/release/sai-windows-x86_64.exe"

      - name: Publish Windows release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: target/release/sai-windows-x86_64.exe
